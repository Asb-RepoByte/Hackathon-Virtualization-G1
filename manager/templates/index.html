<!DOCTYPE html>
<html>
<head>
    <title>System Orchestrator Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .state-badge { font-size: 1.5rem; padding: 10px 20px; }
        .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="mb-4 text-center">Load Balancer Dashboard</h1>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <h3>Current State</h3>
                    <div class="mt-3">
                        <span class="badge bg-primary state-badge">{{ state }}</span>
                    </div>
                    <form action="/update-rpm" method="post" class="mt-4">
                        <label class="form-label">Update RPM</label>
                        <div class="input-group">
                            <input type="number" name="rpm" class="form-control" placeholder="Enter RPM...">
                            <button class="btn btn-success" type="submit">Send</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-4">
                    <h3>Active Frontends</h3>
                    <div class="list-group mt-3">
                        {% if urls %}
                            {% for app, url in urls %}
                            <div class="list-group-item d-flex justify-content-between align-items-center">
                                <div>
                                    <strong>{{ app }}</strong>
                                    <br><small class="text-muted">{{ url }}</small>
                                </div>
                                <a href="{{ url }}" target="_blank" class="btn btn-sm btn-outline-primary">Visit App</a>
                            </div>
                            {% endfor %}
                        {% else: %}
                            <p class="text-muted">No frontends currently active in this state.</p>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-3">
            <a href="/" class="btn btn-secondary">Refresh Dashboard</a>
        </div>
    </div>
</body>
</html>
