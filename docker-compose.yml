services:
  # PostgreSQL Database (Ephemeral - RAM only)
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: carbon
      POSTGRES_USER: carbon
      POSTGRES_PASSWORD: carbon
    tmpfs:
      - /var/lib/postgresql/data:size=256m
    volumes:
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carbon -d carbon"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - carbon-net

  # Flask Backend API
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: carbon
      DB_USER: carbon
      DB_PASSWORD: carbon
    depends_on:
      db:
        condition: service_healthy
    networks:
      - carbon-net

  # Angular Frontend (Nginx)
  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - carbon-net

networks:
  carbon-net:
    driver: bridge
